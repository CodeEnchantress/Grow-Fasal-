{% extends "layout.html" %}
{% block title %}Register | Grow Fasal{% endblock %}
{% block page_title %}Create an Account{% endblock %}

{% block content %}
<div class="cockpit-card" style="max-width: 600px; margin: 2rem auto;">
    <div class="card-header">JOIN GROW FASAL</div>
    <div class="card-body">
        {% if error %}
            <div class="badge badge-danger" style="margin-bottom: 1.5rem; padding: 0.75rem; width: 100%;">{{ error }}</div>
        {% endif %}
        <form action="{{ url_for('register') }}" method="POST">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">Full Name</label>
                    <input type="text" name="name" placeholder="E.g. Rajesh Kumar" required 
                           style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                </div>
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">Phone Number</label>
                    <input type="text" name="phone" placeholder="10 Digits" required 
                           style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                </div>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">I am a:</label>
                <div style="display: flex; gap: 2rem;">
                    <label style="cursor: pointer;"><input type="radio" name="role" value="FARMER" checked> Farmer</label>
                    <label style="cursor: pointer;"><input type="radio" name="role" value="BUYER"> Buyer</label>
                </div>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <button type="button" class="btn btn-outline" id="detect-location" style="margin-bottom: 1rem; width: 100%; border: 1px solid var(--accent-secondary); color: var(--accent-secondary); background: transparent; padding: 0.75rem; border-radius: 8px; font-weight: 700; cursor: pointer;">DETECT MY LOCATION</button>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">State</label>
                        <input type="text" name="state" id="state-input" placeholder="Enter State" required 
                               style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                    </div>
                    <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">District</label>
                        <input type="text" name="district" id="district-input" placeholder="Enter District" required 
                               style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                    </div>
                </div>
                <div style="margin-top: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">Village / Area</label>
                    <input type="text" name="village" id="village-input" placeholder="Enter Village / Area" required 
                           style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                </div>
            </div>

            <div style="margin-bottom: 2rem;">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">Password</label>
                <input type="password" name="password" placeholder="Min. 8 characters" required 
                       style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">CREATE ACCOUNT</button>
        </form>
        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent-secondary); font-weight: 600;">Login</a>
        </div>
    </div>
</div>
{% endblock %}
